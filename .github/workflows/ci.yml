name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Tests (stdlib only, no deps)
        run: python -m unittest discover -s tests -t .
      - name: CLI smoke (free, deterministic)
        run: |
          pip install -e .
          gama --version
          gama bench --backends echo --limit-per-class 1 >/dev/null
